<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OTP Spammer | Brutal Mass SMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ff41;
            padding: 20px;
        }
        .container {
            background: rgba(0,0,0,0.85);
            border: 1px solid #00ff41;
            border-radius: 10px;
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 0 20px rgba(0,255,65,0.3);
            backdrop-filter: blur(2px);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #00ff41;
            font-size: 1.8rem;
            word-break: keep-all;
        }
        h1 small {
            font-size: 0.7rem;
            display: block;
            color: #888;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-size: 16px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-family: monospace;
        }
        input:focus, select:focus, button:focus {
            outline: none;
            box-shadow: 0 0 8px #00ff41;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        button:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 15px #00ff41;
        }
        #log {
            background: #000;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            border: 1px solid #00ff41;
            border-radius: 5px;
            margin-top: 15px;
        }
        .log-entry {
            border-bottom: 1px solid #333;
            padding: 5px;
            font-family: monospace;
            word-break: break-all;
        }
        .success { color: #00ff41; }
        .failed { color: #ff4444; }
        .info { color: #ffaa00; }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #00ff41; border-radius: 4px; }
        @media (max-width: 480px) {
            .container { padding: 20px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔥 OTP SPAMMER v3.0 🔥<small>Vercel Edition</small></h1>
    <input type="text" id="phone" placeholder="Nomor HP target (contoh: 08123456789)" autocomplete="off">
    <select id="threads">
        <option value="10">10 Request paralel (Ringan)</option>
        <option value="20" selected>20 Request paralel (Medium)</option>
        <option value="30">30 Request paralel (Berat - Maksimal Vercel)</option>
    </select>
    <button onclick="startSpam()">💣 MULAI SPAM OTP 💣</button>
    <div id="log">
        <div class="log-entry info">[+] Sistem siap. Masukkan nomor target.</div>
    </div>
    <div class="stats" id="stats"></div>
</div>

<script>
    function addLog(message, type = 'info') {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        if(type === 'success') entry.classList.add('success');
        if(type === 'failed') entry.classList.add('failed');
        if(type === 'info') entry.classList.add('info');
        const timestamp = new Date().toLocaleTimeString('id-ID');
        entry.innerHTML = `[${timestamp}] ${message}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    async function startSpam() {
        const phone = document.getElementById('phone').value.trim();
        const threads = parseInt(document.getElementById('threads').value);
        
        if(!phone) {
            addLog('❌ Nomor HP tidak boleh kosong!', 'failed');
            return;
        }
        
        // Validasi format: hanya angka, panjang 10-13 digit
        const cleanPhone = phone.replace(/^0/, '');
        if(!/^[0-9]{10,13}$/.test(cleanPhone)) {
            addLog('❌ Format nomor tidak valid. Gunakan 10-13 digit angka (contoh: 81234567890)', 'failed');
            return;
        }
        
        addLog(`🚀 Memulai spam OTP ke ${phone} dengan ${threads} thread paralel...`, 'info');
        document.querySelector('button').disabled = true;
        document.querySelector('button').textContent = '⏳ MENGIRIM...';
        
        try {
            const response = await fetch('/api/spam', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone, threads: threads })
            });
            
            const data = await response.json();
            
            if(data.success) {
                addLog(`✅ SPAM SELESAI! Total request: ${data.total_requests} | Berhasil: ${data.successful} | Gagal: ${data.failed}`, 'success');
                
                const statsDiv = document.getElementById('stats');
                statsDiv.innerHTML = `
                    <span>📨 Total: ${data.total_requests}</span>
                    <span>✅ Berhasil: ${data.successful}</span>
                    <span>❌ Gagal: ${data.failed}</span>
                    <span>🎯 Target: ${data.target}</span>
                `;
                
                // Tampilkan detail per layanan (hanya yang sukses/gagal)
                data.details.forEach(d => {
                    if(d.ok && d.status >= 200 && d.status < 300) {
                        addLog(`✓ ${d.service} -> HTTP ${d.status} (OTP terkirim)`, 'success');
                    } else {
                        let errMsg = d.error ? ` (${d.error})` : '';
                        addLog(`✗ ${d.service} -> HTTP ${d.status}${errMsg}`, 'failed');
                    }
                });
            } else {
                addLog(`❌ Server error: ${data.error}`, 'failed');
            }
        } catch(e) {
            addLog(`❌ Koneksi gagal: ${e.message}`, 'failed');
        } finally {
            document.querySelector('button').disabled = false;
            document.querySelector('button').textContent = '💣 MULAI SPAM OTP 💣';
        }
    }
</script>
</body>
</html>
